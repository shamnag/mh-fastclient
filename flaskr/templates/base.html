<!doctype html>
<html>
  <head>
    <title>{% block title %}{% endblock %} - mh-fc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="{{ url_for('static', filename='bs.css') }}" rel="stylesheet">
    <style>
      .app-navbar {
        position: sticky;
        top: 0;
        z-index: 1030;
        border-bottom: 1px solid var(--bs-border-color);
      }

      .app-main {
        width: min(100% - 2rem, 1320px);
        margin: 0 auto;
        padding: 1.5rem 0 3rem;
      }

      @media (min-width: 992px) {
        .app-main {
          width: min(100% - 4rem, 1320px);
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary app-navbar">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('blog.index') }}">mh-fastclient</a>
        {% block devices_button %}{% endblock %}
        <a href="{{ url_for('auth.login') }}">Сменить аккаунт</a>
      </div>
    </nav>
    {% block devices_offcanvas %}{% endblock %}
    <header>{% block header %}{% endblock %}</header>
    <script src="{{ url_for('static', filename='bs.js') }}"></script>
    <main class="app-main">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
